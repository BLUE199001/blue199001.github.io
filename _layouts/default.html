<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <title>{{ site.title }}</title>
    
    <style>
      /* 核心：限制整体页面的最大宽度，调小这个数值可以进一步缩窄 */
      .inner, .outer {
        max-width: 800px; 
        margin: 0 auto;
        padding-left: 20px;
        padding-right: 20px;
      }
      
      /* 极简 Header：减少 padding 压缩高度 */
      header { 
        padding: 10px 0; /* 从 20px 减小到 10px */
        background-color: #082bc7; /* 确保背景色可见 */
      }
      header h1 { 
        font-size: 1.2rem; /* 减小标题字号 */
        margin: 0; 
        color: white;
      }

      /* 个人信息栏布局 */
      .profile-container {
        display: flex;
        align-items: flex-start;
        gap: 25px;
        padding: 20px 0; /* 减少内边距 */
        border-bottom: 1px solid #eee;
        margin-bottom: 20px;
      }
      
      /* 图片样式 */
      .profile-pic {
        width: 140px; /* 稍微调小一点 */
        height: auto;
        border-radius: 4px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        display: block;
      }
      
      .info-text h1 { margin: 0 0 8px 0; font-size: 2.5em; }
      .info-text p { margin: 2px 0; color: #555; font-size: 1.5em; }
      
      /* 极简 Footer：减少高度 */
      footer { 
        margin-top: 30px; 
        padding: 10px 0; /* 减少 padding */
        border-top: 1px solid #eee;
        color: #999; 
        font-size: 0.75em; 
        background-color: #082bc7;
      }

      @media (max-width: 600px) {
        .profile-container { flex-direction: column; align-items: center; text-align: center; }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="inner">
        <h1>Jianfeng Qu, Renmin University of China</h1>
      </div>
    </header>

    <div id="main_content_wrap">
      <section id="main_content" class="inner">
        
        <div class="profile-container">
          <img src="{{ '/assets/avatar.jpg' | relative_url }}" alt="Profile" class="profile-pic">
          
          <div class="info-text">
            <h1>瞿剑峰 (Jianfeng Qu)</h1>
            <p><strong>职位：</strong>副教授，硕士生导师</p>
            <p><strong>单位：</strong>中国人民大学 智慧治理学院</p>
            <p><strong>邮箱：</strong><a href="mailto:jfqu@ruc.edu.cn">jfqu@ruc.edu.cn</a></p>
            <p><strong>地址：</strong>中国 · 江苏 · 苏州</p>
          </div>
        </div>

        {{ content }}
      </section>
    </div>

    <footer class="inner">
      <p class="copyright">项目由 <a href="https://github.com/{{ site.github.owner_name }}">@{{ site.github.owner_name }}</a> 维护</p>
    </footer>
  </body>
</html>
